<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>本地影视管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .poster {
      width: 100%;
      height: 260px;
      object-fit: cover;
      background: #f2f2f2;
    }

    .film-title {
      font-size: 14px;
      font-weight: 600;
      margin-top: 8px;
    }

    .film-meta {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .toolbar>* {
      min-width: 160px;
    }
  </style>
</head>

<body>
  <div id="app"></div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/element-plus"></script>
  <script src="/frontend/films.js"></script>
  <script src="/frontend/actors.js"></script>
  <script src="/frontend/series.js"></script>
  <script src="/frontend/tags.js"></script>
  <script src="/frontend/app.js"></script>
</body>

</html>
